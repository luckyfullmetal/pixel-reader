name: Convert MP4 to Roblox JSON

on:
  push:
    paths:
      - '*.mp4'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install opencv-python-headless base91

      - name: Run Converter
        run: python process.py

      - name: Commit JSON Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          git diff-index --quiet HEAD || git commit -m "Automated video json conversion"
          git push
