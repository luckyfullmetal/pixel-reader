name: Auto Convert Video to Lua Data
on:
  push:
    paths:
      - '*.mp4' # Triggers when any mp4 is added or updated

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install OpenCV
        run: pip install opencv-python-headless

      - name: Run Converter Script
        run: |
          python -c "
          import cv2, os, base64
          
          video_files = [f for f in os.listdir('.') if f.endswith('.mp4')]
          if not video_files:
              print('No MP4 files found!')
              exit(0)
              
          for video_file in video_files:
              name_clean = os.path.splitext(video_file)[0]
              print(f'Processing: {video_file}...')
              
              cap = cv2.VideoCapture(video_file)
              raw_bytes = bytearray()
              
              while cap.isOpened():
                  ret, frame = cap.read()
                  if not ret: break
                  
                  # Enforce strict Nearest Neighbor downscaling
                  resized = cv2.resize(frame, (181, 102), interpolation=cv2.INTER_NEAREST)
                  
                  for y in range(102):
                      for x in range(181):
                          b, g, r = resized[y, x]
                          raw_bytes.append(r)
                          raw_bytes.append(g)
                          raw_bytes.append(b)
                          
              cap.release()
              
              # Turn raw stream into tight base64 text
              b64_string = base64.b64encode(raw_bytes).decode('utf-8')
              
              # Save each video out into its own separate raw data file
              output_filename = f'{name_clean}.txt'
              with open(output_filename, 'w') as f:
                  f.write(b64_string)
              print(f'Created raw asset: {output_filename}')
          "

      - name: Commit and Push Lua Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Add all newly generated video text assets
          git add *.txt
          git commit -m "Batch updated raw pixel data files" || exit 0
          git push
