name: Auto Convert Video to Lua Data
on:
  push:
    paths:
      - '*.mp4'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install opencv-python-headless numpy

      - name: Run Converter Script
        run: |
          python -c "
          import cv2, os, base64
          import numpy as np
          
          video_files = [f for f in os.listdir('.') if f.endswith('.mp4')]
          if not video_files:
              print('No MP4 files found!')
              exit(0)
              
          for video_file in video_files:
              name_clean = os.path.splitext(video_file)[0]
              print(f'Compressing: {video_file}...')
              
              cap = cv2.VideoCapture(video_file)
              frames = []
              
              while cap.isOpened():
                  ret, frame = cap.read()
                  if not ret: break
                  resized = cv2.resize(frame, (181, 102), interpolation=cv2.INTER_NEAREST)
                  resized = cv2.cvtColor(resized, cv2.COLOR_BGR2RGB)
                  frames.append(resized)
              cap.release()
              
              if not frames: continue
              
              all_pixels = np.vstack([f.reshape(-1, 3) for f in frames])
              unique_colors, counts = np.unique(all_pixels, axis=0, return_counts=True)
              
              top_indices = np.argsort(-counts)[:256]
              palette = unique_colors[top_indices]
              
              if len(palette) < 256:
                  padding = np.zeros((256 - len(palette), 3), dtype=np.uint8)
                  palette = np.vstack([palette, padding])
                  
              compressed_bytes = bytearray()
              
              for color in palette:
                  compressed_bytes.extend(color)
                  
              total_frames = len(frames)
              compressed_bytes.extend(total_frames.to_bytes(4, byteorder='big'))
              
              last_frame_indices = np.full((102, 181), -1, dtype=np.int32)
              
              for frame in frames:
                  distances = np.linalg.norm(frame[:, :, None, :] - palette[None, None, :, :], axis=3)
                  current_indices = np.argmin(distances, axis=2).astype(np.uint8)
                  
                  changed_mask = current_indices != last_frame_indices
                  changed_y, changed_x = np.where(changed_mask)
                  
                  change_count = len(changed_y)
                  compressed_bytes.extend(change_count.to_bytes(2, byteorder='big'))
                  
                  for y, x in zip(changed_y, changed_x):
                      compressed_bytes.append(x)
                      compressed_bytes.append(y)
                      compressed_bytes.append(current_indices[y, x])
                      
                  last_frame_indices = current_indices.copy()
                  
              b64_string = base64.b64encode(compressed_bytes).decode('utf-8').strip()
              
              output_filename = f'{name_clean}.txt'
              # Open in standard write mode, stripping everything out
              with open(output_filename, 'w', encoding='utf-8', newline='') as f:
                  f.write(b64_string)
              print(f'Successfully compressed asset: {output_filename}')
          "

      - name: Commit and Push Lua Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.txt
          git commit -m "Apply strict base64 sanitization" || exit 0
          git push
