name: Convert MP4 to Roblox JSON

on:
  push:
    paths:
      - '*.mp4'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Audio Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless base91 numpy moviepy scipy

      - name: Run Frame Converter
        run: python process.py

      - name: Run Audio Baker
        run: python audio_baker.py

      - name: Commit Generated Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          git diff-index --quiet HEAD || (git commit -m "Automated video and audio matrix data extraction" && git push)
